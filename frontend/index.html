<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDoJS</title>
    
    <!-- PrimeReact CSS -->
    <link rel="stylesheet" href="https://unpkg.com/primereact/resources/themes/lara-light-blue/theme.css" id="theme-link" />
    <link rel="stylesheet" href="https://unpkg.com/primereact/resources/primereact.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css" />
    
    <!-- Load theme CSS immediately to prevent FOUC -->
    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        const themeLink = document.getElementById('theme-link');
        
        if (savedTheme === 'dark') {
          themeLink.href = 'https://unpkg.com/primereact/resources/themes/lara-dark-blue/theme.css';
        }
      })();
    </script>
    
    <style>
      /* Hide content until CSS is loaded */
      html {
        opacity: 0;
      }
      
      html.css-loaded {
        transition: opacity 0.15s ease-in;
        opacity: 1;
      }
      
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      // Mark CSS as loaded once DOM is ready
      document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          document.documentElement.classList.add('css-loaded');
        }, 0);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
