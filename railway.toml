[build]
builder = "NIXPACKS"
buildCommand = "if [ \"$APP_TARGET\" = \"frontend\" ]; then cd frontend && npm install && npm run build; else cd backend && npm install; fi"

[deploy]
startCommand = "if [ \"$APP_TARGET\" = \"frontend\" ]; then cd frontend && npm run preview -- --host 0.0.0.0 --port $PORT; else cd backend && BACKEND_PORT=$PORT node src/main.js; fi"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
